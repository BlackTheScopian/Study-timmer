<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FocusFlow AI — Study Timer</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=JetBrains+Mono:wght@300;400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg:        #0d0f14;
    --surface:   #13161e;
    --border:    #1e2330;
    --accent:    #e8a140;
    --glow:      rgba(232,161,64,.18);
    --text:      #e8e2d5;
    --muted:     #5a5f70;
    --green:     #5ec88a;
    --red:       #e05757;
    --ai:        #7c6af5;
    --ai-glow:   rgba(124,106,245,.15);
    --ring-track:#1e2330;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  body{
    background:var(--bg);color:var(--text);
    font-family:'DM Sans',sans-serif;
    min-height:100vh;display:flex;flex-direction:column;align-items:center;
    overflow-x:hidden;
  }
  body::before{
    content:'';position:fixed;top:-200px;left:50%;transform:translateX(-50%);
    width:700px;height:500px;
    background:radial-gradient(ellipse,rgba(232,161,64,.06) 0%,transparent 70%);
    pointer-events:none;z-index:0;
  }

  header{
    width:100%;padding:22px 36px;
    display:flex;align-items:center;justify-content:space-between;
    border-bottom:1px solid var(--border);position:relative;z-index:1;
  }
  .logo{font-family:'DM Serif Display',serif;font-size:1.3rem;color:var(--accent);}
  .logo span{color:var(--text);}
  .logo em{font-style:normal;color:var(--ai);font-size:.85rem;margin-left:6px;
    border:1px solid rgba(124,106,245,.3);border-radius:20px;padding:2px 8px;
    font-family:'JetBrains Mono',monospace;}
  .kbd-hint{font-family:'JetBrains Mono',monospace;font-size:.7rem;color:var(--muted);display:flex;gap:10px;}
  .kbd{border:1px solid var(--border);border-radius:5px;padding:2px 7px;font-size:.67rem;}

  main{
    flex:1;width:100%;max-width:1080px;
    padding:32px 20px 60px;position:relative;z-index:1;
    display:grid;grid-template-columns:1fr 360px;gap:24px;align-items:start;
  }

  .left-panel{display:flex;flex-direction:column;gap:18px;}
  .right-panel{display:flex;flex-direction:column;gap:18px;}

  .card{
    background:var(--surface);border:1px solid var(--border);
    border-radius:20px;padding:24px 26px;
  }
  .lbl{
    font-family:'JetBrains Mono',monospace;font-size:.68rem;
    color:var(--muted);letter-spacing:.12em;text-transform:uppercase;margin-bottom:14px;
  }

  /* ── Goal row ── */
  .goal-row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
  .preset{
    background:var(--ring-track);border:1px solid var(--border);border-radius:10px;
    padding:8px 14px;font-family:'JetBrains Mono',monospace;font-size:.82rem;
    color:var(--text);cursor:pointer;transition:all .2s;
  }
  .preset:hover,.preset.active{background:var(--accent);color:#000;border-color:var(--accent);}
  .custom-wrap{
    display:flex;align-items:center;gap:5px;background:var(--ring-track);
    border:1px solid var(--border);border-radius:10px;padding:6px 11px;flex:1;min-width:120px;
  }
  .custom-wrap input{
    background:none;border:none;outline:none;color:var(--accent);
    font-family:'JetBrains Mono',monospace;font-size:.92rem;width:44px;text-align:center;
  }
  .custom-wrap input::-webkit-inner-spin-button{display:none;}
  .custom-wrap span{color:var(--muted);font-size:.78rem;}

  /* ── Ring ── */
  .timer-center{display:flex;flex-direction:column;align-items:center;gap:22px;padding:28px 0 16px;}
  .ring-wrap{position:relative;width:220px;height:220px;}
  svg.ring-svg{width:220px;height:220px;transform:rotate(-90deg);overflow:visible;}
  .ring-track-el{fill:none;stroke:var(--ring-track);stroke-width:11;}
  .ring-prog{
    fill:none;stroke:var(--accent);stroke-width:11;stroke-linecap:round;
    stroke-dasharray:621.8;stroke-dashoffset:621.8;
    transition:stroke-dashoffset .9s cubic-bezier(.4,0,.2,1),stroke .4s;
    filter:drop-shadow(0 0 7px var(--accent));
  }
  .ring-inner{
    position:absolute;inset:0;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:1px;
  }
  .ring-time{font-family:'JetBrains Mono',monospace;font-size:2.3rem;font-weight:600;line-height:1;}
  .ring-pct{font-family:'JetBrains Mono',monospace;font-size:.82rem;color:var(--accent);}
  .ring-status{font-size:.72rem;color:var(--muted);font-family:'JetBrains Mono',monospace;
    letter-spacing:.1em;text-transform:uppercase;margin-top:2px;}

  .controls{display:flex;gap:10px;align-items:center;}
  .btn-main{
    display:flex;align-items:center;gap:7px;padding:13px 30px;border-radius:50px;
    font-size:.92rem;font-weight:500;cursor:pointer;border:none;transition:all .2s;
    font-family:'DM Sans',sans-serif;
  }
  .btn-go{background:var(--accent);color:#000;box-shadow:0 0 20px var(--glow);}
  .btn-go:hover{background:#f0b050;transform:translateY(-1px);}
  .btn-pause-style{background:var(--ring-track);color:var(--text);border:1px solid var(--border);}
  .btn-pause-style:hover{background:var(--border);}
  .btn-icon{
    width:42px;height:42px;border-radius:50%;background:var(--ring-track);
    border:1px solid var(--border);color:var(--muted);font-size:.95rem;
    cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;
  }
  .btn-icon:hover{border-color:var(--muted);color:var(--text);}

  /* Break banner */
  .break-banner{
    display:none;align-items:center;gap:8px;
    background:rgba(94,200,138,.1);border:1px solid rgba(94,200,138,.25);
    border-radius:12px;padding:11px 14px;font-size:.83rem;color:var(--green);
    animation:slideIn .4s ease;
  }
  .break-banner.show{display:flex;}
  @keyframes slideIn{from{opacity:0;transform:translateY(-6px);}to{opacity:1;transform:translateY(0);}}

  /* Stats */
  .stats-row{display:flex;border:1px solid var(--border);border-radius:14px;overflow:hidden;}
  .stat{flex:1;padding:12px 10px;border-right:1px solid var(--border);text-align:center;}
  .stat:last-child{border-right:none;}
  .sv{font-family:'JetBrains Mono',monospace;font-size:1rem;font-weight:600;color:var(--accent);}
  .sk{font-size:.7rem;color:var(--muted);margin-top:1px;}

  /* ── AI Chat ── */
  .ai-card{
    background:var(--surface);
    border:1px solid rgba(124,106,245,.3);
    border-radius:20px;overflow:hidden;
    display:flex;flex-direction:column;
    height:520px;
  }
  .ai-header{
    padding:16px 20px;border-bottom:1px solid rgba(124,106,245,.15);
    display:flex;align-items:center;gap:10px;
    background:rgba(124,106,245,.06);
  }
  .ai-avatar{
    width:32px;height:32px;border-radius:50%;
    background:linear-gradient(135deg,#7c6af5,#a89af8);
    display:flex;align-items:center;justify-content:center;
    font-size:.9rem;flex-shrink:0;
    box-shadow:0 0 12px var(--ai-glow);
  }
  .ai-name{font-weight:500;font-size:.88rem;}
  .ai-sub{font-size:.72rem;color:var(--muted);font-family:'JetBrains Mono',monospace;}
  .ai-dot{
    width:7px;height:7px;border-radius:50%;background:var(--green);
    margin-left:auto;box-shadow:0 0 6px var(--green);
    animation:pulse 2s infinite;
  }
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}

  .chat-body{
    flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px;
    scroll-behavior:smooth;
  }
  .chat-body::-webkit-scrollbar{width:4px;}
  .chat-body::-webkit-scrollbar-track{background:transparent;}
  .chat-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}

  .msg{display:flex;gap:8px;align-items:flex-start;animation:fadeUp .3s ease;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}
  .msg.user{flex-direction:row-reverse;}

  .msg-avatar{
    width:26px;height:26px;border-radius:50%;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;font-size:.7rem;
    margin-top:2px;
  }
  .msg.ai .msg-avatar{background:linear-gradient(135deg,#7c6af5,#a89af8);}
  .msg.user .msg-avatar{background:var(--ring-track);border:1px solid var(--border);color:var(--muted);}

  .msg-bubble{
    max-width:82%;padding:10px 14px;border-radius:16px;
    font-size:.83rem;line-height:1.55;
  }
  .msg.ai .msg-bubble{
    background:rgba(124,106,245,.1);border:1px solid rgba(124,106,245,.18);
    color:var(--text);border-radius:4px 16px 16px 16px;
  }
  .msg.user .msg-bubble{
    background:var(--accent);color:#000;font-weight:500;
    border-radius:16px 4px 16px 16px;
  }

  .typing-indicator{display:flex;gap:4px;padding:4px 2px;}
  .typing-indicator span{
    width:6px;height:6px;border-radius:50%;background:var(--ai);
    animation:bounce 1.2s infinite;
  }
  .typing-indicator span:nth-child(2){animation-delay:.2s;}
  .typing-indicator span:nth-child(3){animation-delay:.4s;}
  @keyframes bounce{0%,60%,100%{transform:translateY(0);}30%{transform:translateY(-6px);}}

  /* Quick prompts */
  .quick-prompts{
    padding:8px 12px;display:flex;gap:6px;flex-wrap:wrap;
    border-top:1px solid var(--border);
  }
  .qp{
    background:var(--ring-track);border:1px solid var(--border);
    border-radius:20px;padding:5px 11px;font-size:.73rem;
    color:var(--muted);cursor:pointer;transition:all .15s;white-space:nowrap;
  }
  .qp:hover{border-color:var(--ai);color:var(--ai);}

  /* Chat input */
  .chat-input-row{
    padding:12px 14px;border-top:1px solid var(--border);
    display:flex;gap:8px;align-items:flex-end;
  }
  .chat-input{
    flex:1;background:var(--ring-track);border:1px solid var(--border);
    border-radius:12px;padding:10px 14px;color:var(--text);
    font-family:'DM Sans',sans-serif;font-size:.84rem;outline:none;
    resize:none;max-height:100px;line-height:1.5;
    transition:border-color .2s;
  }
  .chat-input:focus{border-color:rgba(124,106,245,.4);}
  .chat-input::placeholder{color:var(--muted);}
  .send-btn{
    width:38px;height:38px;border-radius:50%;
    background:var(--ai);border:none;color:#fff;
    font-size:.9rem;cursor:pointer;transition:all .2s;
    display:flex;align-items:center;justify-content:center;flex-shrink:0;
    box-shadow:0 0 12px var(--ai-glow);
  }
  .send-btn:hover{background:#9585f7;transform:scale(1.05);}
  .send-btn:disabled{background:var(--border);box-shadow:none;cursor:not-allowed;}

  /* Session log */
  .log-card{
    background:var(--surface);border:1px solid var(--border);
    border-radius:20px;padding:20px 22px;max-height:220px;
    display:flex;flex-direction:column;
  }
  .log-list{
    flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:7px;
    margin-top:10px;padding-right:3px;
  }
  .log-list::-webkit-scrollbar{width:3px;}
  .log-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
  .log-entry{
    display:flex;align-items:center;gap:9px;padding:9px 11px;
    background:var(--ring-track);border-radius:9px;animation:fadeUp .3s ease;
  }
  .ld{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
  .ld.work{background:var(--accent);}
  .ld.pause{background:var(--muted);}
  .lt{flex:1;font-size:.77rem;color:var(--muted);font-family:'JetBrains Mono',monospace;}
  .ldur{font-family:'JetBrains Mono',monospace;font-size:.77rem;color:var(--text);font-weight:600;}
  .log-empty-msg{color:var(--muted);font-size:.8rem;text-align:center;margin-top:16px;
    font-family:'DM Serif Display',serif;font-style:italic;}

  /* Completion overlay */
  .overlay{
    display:none;position:fixed;inset:0;background:rgba(13,15,20,.93);z-index:100;
    align-items:center;justify-content:center;flex-direction:column;gap:14px;
  }
  .overlay.show{display:flex;}
  .ov-emoji{font-size:3.8rem;animation:pop .6s cubic-bezier(.34,1.56,.64,1);}
  .ov-title{font-family:'DM Serif Display',serif;font-size:2rem;color:var(--accent);
    animation:pop .6s .1s cubic-bezier(.34,1.56,.64,1) both;}
  .ov-sub{color:var(--muted);font-size:.9rem;animation:pop .6s .2s cubic-bezier(.34,1.56,.64,1) both;}
  .ov-btn{
    margin-top:8px;padding:11px 28px;background:var(--accent);color:#000;
    border:none;border-radius:50px;font-size:.9rem;font-weight:600;cursor:pointer;
    animation:pop .6s .3s cubic-bezier(.34,1.56,.64,1) both;font-family:'DM Sans',sans-serif;
  }
  @keyframes pop{from{opacity:0;transform:scale(.6);}to{opacity:1;transform:scale(1);}}

  @media(max-width:720px){
    main{grid-template-columns:1fr;}
    .right-panel{order:-1;}
    .ai-card{height:400px;}
    header{padding:16px 18px;}
    main{padding:20px 14px 40px;}
  }
</style>
</head>
<body>

<header>
  <div class="logo">Focus<span>Flow</span><em>AI</em></div>
  <div class="kbd-hint">
    <span><kbd class="kbd">Space</kbd> pause</span>
    <span><kbd class="kbd">R</kbd> reset</span>
  </div>
</header>

<main>
  <!-- ── LEFT ── -->
  <div class="left-panel">

    <div class="card">
      <div class="lbl">Today's Goal</div>
      <div class="goal-row">
        <button class="preset" data-min="25">25 min</button>
        <button class="preset" data-min="60">1 hr</button>
        <button class="preset" data-min="120">2 hr</button>
        <button class="preset active" data-min="180">3 hr</button>
        <button class="preset" data-min="300">5 hr</button>
        <div class="custom-wrap">
          <input type="number" id="customMin" value="180" min="1" max="720"/>
          <span>min</span>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="timer-center">
        <div class="ring-wrap">
          <svg class="ring-svg" viewBox="0 0 220 220">
            <circle class="ring-track-el" cx="110" cy="110" r="99"/>
            <circle class="ring-prog" id="ringProg" cx="110" cy="110" r="99"/>
          </svg>
          <div class="ring-inner">
            <div class="ring-time" id="dispTime">00:00:00</div>
            <div class="ring-pct" id="dispPct">0% done</div>
            <div class="ring-status" id="dispStatus">Ready</div>
          </div>
        </div>
        <div class="controls">
          <button class="btn-icon" id="resetBtn" title="Reset (R)">↺</button>
          <button class="btn-main btn-go" id="mainBtn">▶ &nbsp;Start Session</button>
        </div>
        <div class="break-banner" id="breakBanner">
          ☕ &nbsp;<strong>Break time!</strong>&nbsp; You've earned it.
          <button onclick="this.parentElement.classList.remove('show')"
            style="margin-left:auto;background:none;border:none;color:var(--green);cursor:pointer;">✕</button>
        </div>
      </div>
    </div>

    <div class="stats-row">
      <div class="stat"><div class="sv" id="sWorked">0:00</div><div class="sk">Worked</div></div>
      <div class="stat"><div class="sv" id="sRemain">—</div><div class="sk">Remaining</div></div>
      <div class="stat"><div class="sv" id="sSessions">0</div><div class="sk">Sessions</div></div>
      <div class="stat"><div class="sv" id="sBreaks">0</div><div class="sk">Pauses</div></div>
    </div>

    <div class="log-card">
      <div class="lbl">Session Log</div>
      <div class="log-list" id="logList">
        <div class="log-empty-msg" id="logEmpty">Start the timer to track sessions.</div>
      </div>
    </div>

  </div>

  <!-- ── RIGHT: AI Coach ── -->
  <div class="right-panel">
    <div class="ai-card">
      <div class="ai-header">
        <div class="ai-avatar">🧠</div>
        <div>
          <div class="ai-name">Nova — Study Coach</div>
          <div class="ai-sub">Powered by Claude</div>
        </div>
        <div class="ai-dot"></div>
      </div>

      <div class="chat-body" id="chatBody">
        <!-- messages injected here -->
      </div>

      <div class="quick-prompts" id="quickPrompts">
        <button class="qp" onclick="sendQuick('Give me a study tip for staying focused')">💡 Study tip</button>
        <button class="qp" onclick="sendQuick('How am I doing so far?')">📊 My progress</button>
        <button class="qp" onclick="sendQuick('I feel distracted, help me refocus')">🎯 Refocus me</button>
        <button class="qp" onclick="sendQuick('What should I do during my break?')">☕ Break ideas</button>
        <button class="qp" onclick="sendQuick('Motivate me to keep going!')">🔥 Motivate me</button>
      </div>

      <div class="chat-input-row">
        <textarea class="chat-input" id="chatInput" placeholder="Ask Nova anything..." rows="1"></textarea>
        <button class="send-btn" id="sendBtn" title="Send">➤</button>
      </div>
    </div>
  </div>
</main>

<!-- Completion overlay -->
<div class="overlay" id="overlay">
  <div class="ov-emoji">🎯</div>
  <div class="ov-title">Goal Achieved!</div>
  <div class="ov-sub" id="ovSub">Amazing work today.</div>
  <button class="ov-btn" onclick="resetAll();document.getElementById('overlay').classList.remove('show')">New Session</button>
</div>

<script>
// ─── Timer State ─────────────────────────────────────────────────────────────
const CIRC = 2 * Math.PI * 99; // 621.8
let goalSec    = 180 * 60;
let elapsed    = 0;
let running    = false;
let timer      = null;
let sessStart  = null;
let sessCount  = 0;
let pauseCount = 0;
let breakMark  = [];

const ringProg  = document.getElementById('ringProg');
const dispTime  = document.getElementById('dispTime');
const dispPct   = document.getElementById('dispPct');
const dispStatus= document.getElementById('dispStatus');
const mainBtn   = document.getElementById('mainBtn');
const resetBtn  = document.getElementById('resetBtn');
const breakBanner=document.getElementById('breakBanner');
const logList   = document.getElementById('logList');
const logEmpty  = document.getElementById('logEmpty');

function fmt(s){
  const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60;
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
}
function fmtShort(s){
  const h=Math.floor(s/3600),m=Math.floor((s%3600)/60);
  if(h>0)return `${h}h ${m}m`;
  return `${m}m ${s%60}s`;
}

function updateRing(){
  const pct = Math.min(elapsed/goalSec,1);
  ringProg.style.strokeDashoffset = CIRC*(1-pct);
  if(pct>=1){ringProg.style.stroke='var(--green)';ringProg.style.filter='drop-shadow(0 0 9px var(--green))';}
  else{ringProg.style.stroke='var(--accent)';ringProg.style.filter='drop-shadow(0 0 7px var(--accent))';}
  dispTime.textContent = fmt(elapsed);
  dispPct.textContent  = Math.floor(pct*100)+'% done';
  document.getElementById('sWorked').textContent  = fmtShort(elapsed);
  const rem=Math.max(goalSec-elapsed,0);
  document.getElementById('sRemain').textContent  = rem>0?fmtShort(rem):'—';
}

function addLog(type,dur){
  logEmpty.style.display='none';
  const e=document.createElement('div');
  e.className='log-entry';
  const t=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  e.innerHTML=`<div class="ld ${type}"></div><div class="lt">${type==='work'?'Work':'Pause'} · ${t}</div><div class="ldur">${fmtShort(dur)}</div>`;
  logList.prepend(e);
}

function checkBreak(){
  const m=Math.floor(elapsed/60);
  const mile=Math.floor(m/25)*25;
  if(mile>0&&!breakMark.includes(mile)){
    breakMark.push(mile);
    breakBanner.classList.add('show');
    setTimeout(()=>breakBanner.classList.remove('show'),9000);
    // AI automatically cheers
    addAiMessage(`⏰ You've hit the **${mile}-minute mark** — that's a solid stretch of focus! Consider a 5-minute break: stand up, breathe, hydrate. You're ${Math.floor(elapsed/goalSec*100)}% toward your goal. Keep it up!`);
  }
}

function startTimer(){
  running=true;sessStart=Date.now()-elapsed*1000;
  sessCount++;document.getElementById('sSessions').textContent=sessCount;
  dispStatus.textContent='Focusing...';dispStatus.style.color='var(--green)';
  mainBtn.innerHTML='⏸ &nbsp;Pause';
  mainBtn.classList.remove('btn-go');mainBtn.classList.add('btn-pause-style');
  timer=setInterval(()=>{elapsed++;updateRing();checkBreak();if(elapsed>=goalSec)completeGoal();},1000);
}

function pauseTimer(){
  running=false;clearInterval(timer);
  const dur=Math.round((Date.now()-sessStart)/1000);
  addLog('work',dur);
  pauseCount++;document.getElementById('sBreaks').textContent=pauseCount;
  dispStatus.textContent='Paused';dispStatus.style.color='var(--muted)';
  mainBtn.innerHTML='▶ &nbsp;Resume';
  mainBtn.classList.add('btn-go');mainBtn.classList.remove('btn-pause-style');
}

function toggleTimer(){if(running)pauseTimer();else startTimer();}

function resetAll(){
  clearInterval(timer);running=false;elapsed=0;sessCount=0;pauseCount=0;breakMark=[];
  document.getElementById('sSessions').textContent='0';
  document.getElementById('sBreaks').textContent='0';
  dispStatus.textContent='Ready';dispStatus.style.color='';
  mainBtn.innerHTML='▶ &nbsp;Start Session';
  mainBtn.classList.add('btn-go');mainBtn.classList.remove('btn-pause-style');
  breakBanner.classList.remove('show');
  logEmpty.style.display='';
  Array.from(logList.querySelectorAll('.log-entry')).forEach(e=>e.remove());
  updateRing();
}

function completeGoal(){
  clearInterval(timer);running=false;
  dispStatus.textContent='Done! 🎉';dispStatus.style.color='var(--green)';
  mainBtn.innerHTML='▶ &nbsp;Start Session';mainBtn.classList.add('btn-go');mainBtn.classList.remove('btn-pause-style');
  document.getElementById('ovSub').textContent=`You focused for ${fmtShort(elapsed)} today. Outstanding!`;
  document.getElementById('overlay').classList.add('show');
  addAiMessage(`🏆 **Goal complete!** You just finished ${fmtShort(elapsed)} of focused study — that's a real achievement. Take a proper break, celebrate, and come back tomorrow refreshed. I'm proud of your dedication!`);
}

// ── Presets ───────────────────────────────────────────────────────────────────
document.querySelectorAll('.preset').forEach(b=>{
  b.addEventListener('click',()=>{
    if(running)return;
    document.querySelectorAll('.preset').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    const m=parseInt(b.dataset.min);
    document.getElementById('customMin').value=m;
    goalSec=m*60;elapsed=0;updateRing();
    document.getElementById('sRemain').textContent=fmtShort(goalSec);
  });
});
document.getElementById('customMin').addEventListener('input',function(){
  if(running)return;
  const v=Math.max(1,Math.min(720,parseInt(this.value)||1));
  goalSec=v*60;elapsed=0;
  document.querySelectorAll('.preset').forEach(b=>b.classList.toggle('active',parseInt(b.dataset.min)===v));
  updateRing();document.getElementById('sRemain').textContent=fmtShort(goalSec);
});

mainBtn.addEventListener('click',toggleTimer);
resetBtn.addEventListener('click',()=>{if(!running)resetAll();});
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA')return;
  if(e.code==='Space'){e.preventDefault();toggleTimer();}
  if(e.code==='KeyR'&&!running)resetAll();
});

// ─── AI Chat ─────────────────────────────────────────────────────────────────
const chatBody  = document.getElementById('chatBody');
const chatInput = document.getElementById('chatInput');
const sendBtn   = document.getElementById('sendBtn');

// Conversation history for multi-turn memory
let chatHistory = [];

function getTimerContext(){
  const pct=Math.floor(elapsed/goalSec*100);
  const goalMin=Math.floor(goalSec/60);
  const workedMin=Math.floor(elapsed/60);
  const remMin=Math.floor(Math.max(goalSec-elapsed,0)/60);
  return `[TIMER CONTEXT]
- Study goal: ${goalMin} minutes
- Time worked so far: ${workedMin} minutes (${pct}% complete)
- Time remaining: ${remMin} minutes
- Number of focus sessions: ${sessCount}
- Number of pauses taken: ${pauseCount}
- Timer status: ${running?'Currently running (user is actively studying)':'Paused or not started'}`;
}

function addUserBubble(text){
  const div=document.createElement('div');
  div.className='msg user';
  div.innerHTML=`<div class="msg-avatar">👤</div><div class="msg-bubble">${escHtml(text)}</div>`;
  chatBody.appendChild(div);
  chatBody.scrollTop=chatBody.scrollHeight;
}

function addAiMessage(text){
  const div=document.createElement('div');
  div.className='msg ai';
  div.innerHTML=`<div class="msg-avatar">🧠</div><div class="msg-bubble">${renderMd(text)}</div>`;
  chatBody.appendChild(div);
  chatBody.scrollTop=chatBody.scrollHeight;
}

function addTyping(){
  const div=document.createElement('div');
  div.className='msg ai';div.id='typing';
  div.innerHTML=`<div class="msg-avatar">🧠</div><div class="msg-bubble"><div class="typing-indicator"><span></span><span></span><span></span></div></div>`;
  chatBody.appendChild(div);
  chatBody.scrollTop=chatBody.scrollHeight;
  return div;
}

function escHtml(t){
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderMd(text){
  // Simple markdown: **bold**, *italic*, newlines
  return text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.*?)\*/g,'<em>$1</em>')
    .replace(/\n/g,'<br>');
}

async function sendMessage(userText){
  if(!userText.trim())return;
  sendBtn.disabled=true;

  addUserBubble(userText);
  chatHistory.push({role:'user',content:userText});

  const typingEl=addTyping();

  const systemPrompt=`You are Nova, a friendly, knowledgeable, and encouraging AI study coach embedded inside FocusFlow — a study timer app. Your personality is warm, motivating, direct, and occasionally witty. You help students stay focused, manage their time, develop good study habits, and feel supported.

You have real-time access to the user's timer data shown below. Use this context naturally in your responses — reference how much they've worked, celebrate milestones, give advice relevant to where they are in their session.

${getTimerContext()}

Guidelines:
- Keep responses concise (2-5 sentences usually). Be conversational.
- Use the timer context naturally — don't just read it back, weave it in.
- Use **bold** for emphasis occasionally.
- Celebrate progress genuinely. Don't be sycophantic.
- For study tips, give specific, actionable advice.
- If asked about break activities, suggest real things (stretch, hydrate, walk, etc.)
- You can use light emoji but don't overdo it.`;

  try{
    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':'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','anthropic-version':'2023-06-01'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1000,
        system:systemPrompt,
        messages:chatHistory
      })
    });
    const data=await resp.json();
    typingEl.remove();

    if(data.content&&data.content[0]){
      const aiText=data.content[0].text;
      chatHistory.push({role:'assistant',content:aiText});
      addAiMessage(aiText);
    } else {
      addAiMessage("I'm having a little trouble connecting right now. Try again in a moment!");
    }
  } catch(err){
    typingEl.remove();
    addAiMessage("Connection hiccup! Make sure you're online and try again.");
  }

  sendBtn.disabled=false;
  chatInput.focus();
}

function sendQuick(text){
  chatInput.value='';
  sendMessage(text);
}

sendBtn.addEventListener('click',()=>{
  const v=chatInput.value.trim();
  chatInput.value='';
  autoResize();
  sendMessage(v);
});

chatInput.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&!e.shiftKey){
    e.preventDefault();
    const v=chatInput.value.trim();
    chatInput.value='';
    autoResize();
    sendMessage(v);
  }
});

function autoResize(){
  chatInput.style.height='auto';
  chatInput.style.height=Math.min(chatInput.scrollHeight,100)+'px';
}
chatInput.addEventListener('input',autoResize);

// ─── Welcome message ──────────────────────────────────────────────────────────
window.addEventListener('load',()=>{
  updateRing();
  document.getElementById('sRemain').textContent=fmtShort(goalSec);
  setTimeout(()=>{
    addAiMessage("Hey! 👋 I'm **Nova**, your AI study coach. Set your goal above, hit **Start**, and I'll be right here to keep you on track. Feel free to ask me anything — tips, motivation, break ideas, or just a check-in. Let's make today count!");
  },400);
});
</script>
